encoding: utf-8

# SEO相关信息
title: Xumin Liang Blog
description: 梁旭民的个人博客
keywords: Xumin Liang,Blog, Mathematics, Physics
author: Xumin Liang
footerText: 'Copyright © 2021 Xumin Liang'

# 这些不要动
permalink: /posts/:year/:month/:day/:title.html
kramdown:
  auto_ids: true
  input: GFM
  syntax_highlighter: rouge
exclude: ['CNAME', 'README.md', 'LICENSE', '_site', 'dist', 'Gemfile', 'Gemfile.lock', 'blog.sh']

# 域名配置
# baseurl配置,如果网站部署在根目录下的其他目录中，请设置为 /目录名
domainUrl: 'http://Xumin-Liang.github.io'
baseurl: ''

# 吐个槽地址，会在chat页面中重定向到该地址
comments: true
# 菜单
menu:
  - title: Homepage
    url: /
  - title: Categories
    url: /pages/categories.html
  - title: Search
    url: /pages/search.html
  - title: Links
    url: /pages/links.html
  - title: Bulletin Board
    url: /pages/chat.html
  - title: About me
    url: /pages/about.html

# 点击页面文字冒出特效,不需要请设置为false
extClickEffect: false

# Google Adsense,不需要请设置为false
# _includes/ext-adsense.html 里面修改为自己的配置
extAdsense: false

# 腾讯MTA移动分析,不需要请设置为false
# _includes/ext-adsense.html 里面修改为自己的配置
extMTA: true

# 百度收录自动推送,不需要请设置为false
extBaidu: false

# 数学公式支持，比较影响加载速度,不需要请设置为false
extMath: true

# 友情链接
links:
  - title: SmartHypercube
    url: https://0x01.me
  - title: Yunze Man
    url: https://yunzeman.github.io/
